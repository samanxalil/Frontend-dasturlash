<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Layout Reconstruction</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <div class="canvas">
        <div class="shape red-rect"></div>
        <div class="shape purple-rect"></div>

        <div class="shape teal-rect"></div>

        <div class="shape dark-teal-rect"></div>

        <div class="shape blue-rect"></div>

        <div class="shape circle-outer">
            <div class="circle-inner"></div>
        </div>

        <div class="shape green-dark-rect"></div>
        <div class="shape green-light-rect"></div>
        <div class="shape green-med-rect"></div>
    </div>
<div class="container">
        <p>position: static</p>
        <div class="box red">One</div>
        <div class="box green static">Two</div>
        <div class="box red">Three</div>
        <div class="box red">Four</div>
    </div>

    <div class="container">
        <p>position: relative</p>
        <div class="box red">One</div>
        <div class="box green relative">Two</div>
        <div class="box red">Three</div>
        <div class="box red">Four</div>
    </div>

    <div class="container relative-parent">
        <p>position: absolute</p>
        <div class="box red">One</div>
        <div class="box green absolute">Two</div>
        <div class="box red">Three</div>
        <div class="box red">Four</div>
    </div>      
</body>
</html>
